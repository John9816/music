name: Android APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant to assemble (debug|release|both)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - debug
          - release
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK(s)
        shell: bash
        run: |
          set -euo pipefail
          # Ensure repo-local gradle.properties doesn't force a Windows-only Java path.
          # (setup-java provides the correct JAVA_HOME on GitHub runners.)
          if [[ -f gradle.properties ]]; then
            sed -i.bak '/^org\.gradle\.java\.home=/d' gradle.properties || true
          fi
          variant="${{ github.event.inputs.variant || 'both' }}"
          echo "variant=$variant"
          if [[ "$variant" == "debug" ]]; then
            ./gradlew :app:assembleDebug --no-daemon
          elif [[ "$variant" == "release" ]]; then
            ./gradlew :app:assembleRelease --no-daemon
          else
            ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon
          fi

      - name: Upload Debug APK artifact
        if: ${{ github.event.inputs.variant != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK artifact
        if: ${{ github.event.inputs.variant != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json
          if-no-files-found: warn

      - name: Publish GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json
