name: Android APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant to assemble (debug|release|both)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - debug
          - release
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(grep -oE 'versionName "[^"]+"' app/build.gradle | head -n1 | sed -E 's/versionName "([^"]+)"/\1/')"
          version_code="$(grep -oE 'versionCode [0-9]+' app/build.gradle | head -n1 | awk '{print $2}')"
          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo "Failed to read version information from app/build.gradle" >&2
            exit 1
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name"
          echo "version_code=$version_code"

      - name: Validate release tag matches app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="v${{ steps.app_version.outputs.version_name }}"
          actual_tag="${GITHUB_REF_NAME}"
          if [[ "$actual_tag" != "$expected_tag" ]]; then
            echo "Tag $actual_tag does not match app version $expected_tag" >&2
            exit 1
          fi

      - name: Prepare signing config
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" && -n "${ANDROID_KEYSTORE_PASSWORD}" && -n "${ANDROID_KEY_ALIAS}" && -n "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > release.keystore
            printf '%s\n' \
              'storeFile=release.keystore' \
              "storePassword=${ANDROID_KEYSTORE_PASSWORD}" \
              "keyAlias=${ANDROID_KEY_ALIAS}" \
              "keyPassword=${ANDROID_KEY_PASSWORD}" \
              > keystore.properties
          else
            echo "Signing secrets are not fully configured. Building unsigned release APK."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK(s)
        shell: bash
        run: |
          set -euo pipefail
          # Ensure repo-local gradle.properties doesn't force a Windows-only Java path.
          # (setup-java provides the correct JAVA_HOME on GitHub runners.)
          if [[ -f gradle.properties ]]; then
            sed -i.bak '/^org\.gradle\.java\.home=/d' gradle.properties || true
          fi
          variant="${{ github.event.inputs.variant || 'both' }}"
          echo "variant=$variant"
          if [[ "$variant" == "debug" ]]; then
            ./gradlew :app:assembleDebug --no-daemon
          elif [[ "$variant" == "release" ]]; then
            ./gradlew :app:assembleRelease --no-daemon
          else
            ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon
          fi

      - name: Publish GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Music Player v${{ steps.app_version.outputs.version_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/output-metadata.json
