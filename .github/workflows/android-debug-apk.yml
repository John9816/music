name: Android APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant to assemble (debug|release|both)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - debug
          - release
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(grep -oE 'versionName "[^"]+"' app/build.gradle | head -n1 | sed -E 's/versionName "([^"]+)"/\1/')"
          version_code="$(grep -oE 'versionCode [0-9]+' app/build.gradle | head -n1 | awk '{print $2}')"
          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo "Failed to read version information from app/build.gradle" >&2
            exit 1
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name"
          echo "version_code=$version_code"

      - name: Validate release tag matches app version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="v${{ steps.app_version.outputs.version_name }}"
          actual_tag="${GITHUB_REF_NAME}"
          if [[ "$actual_tag" != "$expected_tag" ]]; then
            echo "Tag $actual_tag does not match app version $expected_tag" >&2
            exit 1
          fi

      - name: Prepare signing config
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" && -n "${ANDROID_KEYSTORE_PASSWORD}" && -n "${ANDROID_KEY_ALIAS}" && -n "${ANDROID_KEY_PASSWORD}" && -n "${ANDROID_SIGNING_CERT_SHA256}" ]]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > release.keystore
            printf '%s\n' \
              'storeFile=release.keystore' \
              "storePassword=${ANDROID_KEYSTORE_PASSWORD}" \
              "keyAlias=${ANDROID_KEY_ALIAS}" \
              "keyPassword=${ANDROID_KEY_PASSWORD}" \
              > keystore.properties
          else
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              echo "All release signing secrets, including ANDROID_SIGNING_CERT_SHA256, are required for version tags." >&2
              exit 1
            fi
            echo "Signing secrets are not fully configured. Branch builds may produce an unsigned release APK."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK(s)
        shell: bash
        run: |
          set -euo pipefail
          # Ensure repo-local gradle.properties doesn't force a Windows-only Java path.
          # (setup-java provides the correct JAVA_HOME on GitHub runners.)
          if [[ -f gradle.properties ]]; then
            sed -i.bak '/^org\.gradle\.java\.home=/d' gradle.properties || true
          fi
          variant="${{ github.event.inputs.variant || 'both' }}"
          echo "variant=$variant"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleRelease --no-daemon
          elif [[ "$variant" == "debug" ]]; then
            ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --no-daemon
          elif [[ "$variant" == "release" ]]; then
            ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleRelease --no-daemon
          else
            ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug :app:assembleRelease --no-daemon
          fi

      - name: Verify and stage release APK
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_apk
        shell: bash
        env:
          ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          set -euo pipefail
          apk="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "$apk" ]]; then
            echo "Release APK was not produced." >&2
            exit 1
          fi

          build_tools="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          apksigner="${build_tools}/apksigner"
          aapt="${build_tools}/aapt"

          "$apksigner" verify "$apk"
          badging="$("$aapt" dump badging "$apk" | head -n1)"
          echo "$badging"
          grep -q "name='com.music.player'" <<<"$badging"
          grep -q "versionCode='${{ steps.app_version.outputs.version_code }}'" <<<"$badging"
          grep -q "versionName='${{ steps.app_version.outputs.version_name }}'" <<<"$badging"

          cert_output="$("$apksigner" verify --print-certs "$apk" 2>&1)"
          actual_cert="$(printf '%s\n' "$cert_output" \
            | grep -i -m1 'certificate SHA-256 digest' \
            | sed -E 's/.*:[[:space:]]*//' \
            | tr -d ':[:space:]' \
            | tr '[:upper:]' '[:lower:]')"
          expected_cert="$(printf '%s' "${ANDROID_SIGNING_CERT_SHA256}" \
            | tr -d ':[:space:]' \
            | tr '[:upper:]' '[:lower:]')"
          if [[ -z "$actual_cert" || "$actual_cert" != "$expected_cert" ]]; then
            echo "Release certificate mismatch. expected=$expected_cert actual=$actual_cert" >&2
            exit 1
          fi

          release_name="DuckMusic-v${{ steps.app_version.outputs.version_name }}.apk"
          release_path="app/build/outputs/apk/release/${release_name}"
          cp "$apk" "$release_path"
          echo "path=$release_path" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: DuckMusic v${{ steps.app_version.outputs.version_name }}
          generate_release_notes: true
          files: |
            ${{ steps.release_apk.outputs.path }}
            app/build/outputs/apk/release/output-metadata.json
